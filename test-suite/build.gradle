tasks.named('testMigrationDemo') {
    mustRunAfter tasks.named('cypressMigrationOracle')
}

tasks.register('cypressMigrationCheck') {
    group = 'verification'
    description = 'Aggregate check for Cypress migration: tool tests, synthetic inventory/risk/draft, oracle, evidence, and testMigrationDemo.'
    dependsOn tasks.named('cypressMigrationToolTest'),
            tasks.named('cypressMigrationInventory'),
            tasks.named('cypressMigrationRisk'),
            tasks.named('cypressMigrationDraft'),
            tasks.named('cypressMigrationOracle'),
            tasks.named('testMigrationDemo'),
            tasks.named('cypressMigrationEvidence')
