tasks.register('recordCase') {
    group = 'case onboarding'
    description = 'Records browser actions into a Java Playwright draft under test-suite/build/case-drafts.'
    dependsOn tasks.named('caseRecorderCheck')

    doLast {
        String areaName = requireProjectProperty('area')
        Map<String, ?> areaConfig = requireCucumberArea(areaName)
        String featureName = requireProjectProperty('feature')
        String scenarioName = optionalProjectProperty('scenario', featureName)
        String path = optionalProjectProperty('path', areaConfig.explore?.path ?: '/')
        String baseUrl = System.getProperty('base.url') ?: areaConfig.baseUrl
        if (baseUrl == null || baseUrl.isBlank()) {
            throw new GradleException("Area '${areaName}' has no baseUrl. Pass one with -Dbase.url=...")
        }

        File draftDir = layout.buildDirectory.dir("case-drafts/${areaName}/${featureName}").get().asFile
        List<String> toolArgs = [
                caseRecorderDir.toPath().resolve('src/record.mjs').toFile().absolutePath,
                '--area', areaName,
                '--feature', featureName,
                '--scenario', scenarioName,
                '--path', path,
                '--url', resolveExploreUrl(baseUrl, path),
                '--draft-dir', draftDir.absolutePath,
                '--playwright-version', nodePlaywrightVersion,
                '--test-id-attribute', areaConfig.explore?.testIdAttribute ?: 'data-testid'
        ]

        if (Boolean.parseBoolean(optionalProjectProperty('force', 'false'))) {
            toolArgs += '--force'
        }

        exec {
            workingDir rootProject.projectDir
            commandLine([nodeExecutable] + toolArgs)
            configureNpmRegistry(delegate)
        }
    }
}

def generateCaseFromRecordingAction = {
    String areaName = requireProjectProperty('area')
    Map<String, ?> areaConfig = requireCucumberArea(areaName)
    String featureName = requireProjectProperty('feature')
    String scenarioName = optionalProjectProperty('scenario')
    String baseUrl = System.getProperty('base.url') ?: areaConfig.baseUrl
    File draftDir = layout.buildDirectory.dir("case-drafts/${areaName}/${featureName}").get().asFile
    List<String> toolArgs = [
            caseRecorderDir.toPath().resolve('src/generate.mjs').toFile().absolutePath,
            '--repo-root', rootProject.projectDir.absolutePath,
            '--area', areaName,
            '--feature', featureName,
            '--draft-dir', draftDir.absolutePath
    ]

    if (scenarioName != null) {
        toolArgs += ['--scenario', scenarioName]
    }
    if (baseUrl != null && !baseUrl.isBlank()) {
        toolArgs += ['--base-url', baseUrl]
    }
    if (Boolean.parseBoolean(optionalProjectProperty('force', 'false'))) {
        toolArgs += '--force'
    }

    exec {
        workingDir rootProject.projectDir
        commandLine([nodeExecutable] + toolArgs)
    }
}

tasks.register('generateCaseFromRecording') {
    group = 'case onboarding'
    description = 'Generates feature and step-definition drafts from a recorded case.'
    dependsOn tasks.named('caseRecorderCheck')

    doLast(generateCaseFromRecordingAction)
}

tasks.register('generateCase') {
    group = 'case onboarding'
    description = 'Alias for generateCaseFromRecording.'
    dependsOn tasks.named('caseRecorderCheck')

    doLast(generateCaseFromRecordingAction)
}

tasks.register('testAllApps') {
    group = 'verification'
    description = 'Runs all area-specific Cucumber tasks.'
    dependsOn cucumberAreas.collect { areaEntry -> tasks.named(areaEntry.value.taskName) }
}

test {
    description = 'Runs the full Cucumber test suite.'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath

    filter {
        includeTestsMatching(fullSuiteRunnerClassName)
        failOnNoMatchingTests = true
    }

    configureSharedRuntime(delegate, layout.buildDirectory.dir('artifacts/all').get().asFile.absolutePath)
    forwardRuntimeProperties(delegate)
}
