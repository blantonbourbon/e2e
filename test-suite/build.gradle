            cypressMigrationCli.absolutePath,
            command,
            '--source-root',
            syntheticCypressDir.absolutePath,
            '--output-dir',
            cypressMigrationOutputDir.get().asFile.absolutePath,
            '--repo-root',
            rootProject.projectDir.absolutePath,
            '--port',
            '8790'
    ]
}

