commands:
  install: ./gradlew --version --no-daemon
  typecheck: ./gradlew testClasses --no-daemon --max-workers=4
  build: ./gradlew assemble --no-daemon --max-workers=4
  test: ./gradlew test --no-daemon --max-workers=3
  lint: ./gradlew check --no-daemon --max-workers=3
  sample_test: ./gradlew :test-suite:test --no-daemon --max-workers=2
  allure_report: ./gradlew allureReport --no-daemon

services:
  demo-app:
    start: python3 -m http.server 3110 --directory /home/kratos/projects/e2e/test-suite/src/test/resources/demo-app
    stop: python3 -c "import os,signal; data=[line.split()[1] for line in open('/proc/net/tcp').read().splitlines()[1:] if line.split()[3]=='0A' and int(line.split()[1].split(':')[1],16)==3110]; inode=set(data); pids=[]; import glob; [pids.append(int(path.split('/')[2])) for path in glob.glob('/proc/[0-9]*/fd/*') if os.path.islink(path) and os.readlink(path).startswith('socket:[') and os.readlink(path)[8:-1] in inode]; [os.kill(pid, signal.SIGTERM) for pid in sorted(set(pids))]"
    healthcheck: curl -sf http://localhost:3110/
    port: 3110
    depends_on: []
